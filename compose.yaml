# AssetVane — 開発/本番の土台（ADR-021）。今回は dev を通すまで。
# SQLite はファイルなので DB コンテナは作らず ./data を bind mount で永続化（ADR-002/021）。
# uv / npm はすべてコンテナ内で動かし、ホストに node_modules/.venv を作らない。
#
# ポートはホスト側だけ環境変数で上書き可能（コンテナ内は固定）。衝突時は
#   FRONTEND_PORT=3100 BACKEND_PORT=8100 docker compose up
# のように起動する。既定は 3000 / 8000（どちらもホストで空いていることを確認済み）。

services:
  backend:
    # dev ステージを明示（Dockerfile は base→dev→prod のマルチステージ・ADR-021）。
    # 本番は compose.prod.yaml が ghcr の prod イメージを pull する（scripts/deploy.sh）。
    build:
      context: ./backend
      target: dev
    # dev は --reload。ソースはバインドマウントなのでホスト編集が即反映される。
    # --reload-include .env: .env を編集したら自動リロード（pydantic が読み直して設定反映）。
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-include .env
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/.venv # ← anonymous volume。ホスト側の .venv 不在でコンテナ内を上書きしない（ADR-021）
      # SQLite 置き場（git 管理外）。backend/data は repo-root ./data への symlink（../data）で、
      # コンテナ内では /app/data → /app/../data = /data に解決されるため /data にマウントする。
      # ⚠️ dev だけ named volume を使う（bind mount にしない）。macOS Docker Desktop の
      # gRPC-FUSE/virtiofs 上では SQLite の WAL/mmap が壊れることがあり、2026-06-22 に全銘柄
      # バックフィル中の重い書き込みで us_daily_quotes/daily_quotes の b-tree がページ破損した
      # （ページ二重参照・rowid out of order・.recover で復旧済み）。named volume は Docker VM 内の
      # ext4 に載りネイティブ fs で SQLite が正しく動くため再発を断つ。prod（compose.prod.yaml・Pi）は
      # ネイティブ Linux で FUSE 問題が無く /data/backups（ADR-017）も要るので bind mount のまま。
      # ホストから素ファイルとして見えなくなるので、バックアップは `make db-backup` を使う。
      - assetvane-db:/data
    # ⚠️ env_file はあえて使わない。compose の env_file はコンテナ「作成時」に env を注入し、
    # それが pydantic の .env 読みを上書きするため、.env を変えても --force-recreate しないと
    # 反映されない（切り替えが激重）。代わりに backend/.env はバインドマウント（/app/.env）越しに
    # pydantic-settings が直接読む（config.py の env_file=".env"）。これで .env 編集 →
    # 自動リロード（--reload-include .env）だけで切り替わる。秘密は backend/.env のみ（ADR-005）。
    environment:
      # Docker volume 上では inotify が効かないことがあるため polling で reload を担保。
      - WATCHFILES_FORCE_POLLING=true
      # タイムゾーンを JST に固定（Phase 6・phase6-spec §5）。夜間バッチ cron は
      # CronTrigger(timezone="Asia/Tokyo") で明示するが、ログの時刻表記も JST に揃える。
      - TZ=Asia/Tokyo
    # ログローテーションは本番（compose.prod.yaml）が主目的だが、dev/prod 差を減らすため整合させる（ADR-017/038）。
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    # dev ステージを明示（Dockerfile は dev→deps→builder→runner のマルチステージ・ADR-021/022）。
    build:
      context: ./frontend
      target: dev
    command: npm run dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules # ← anonymous volume。ホストに node_modules を作らない（ADR-021）
    environment:
      # 同一オリジン化（ADR-037）: ブラウザは /api を叩き、Next の rewrites が裏で backend へ転送する。
      # 転送先は Next サーバ（コンテナ内）から見た backend なので内部 DNS の固定名でよい。dev は
      # next.config が runtime に読むのでここで渡す（host 直 dev は未設定で localhost:8000 に落ちる）。
      - BACKEND_ORIGIN=http://backend:8000
      # Docker volume 上での HMR を polling で担保。
      - WATCHPACK_POLLING=true
    # backend と同じく json-file ローテーション（10m × 5）。dev/prod 差を減らすため整合させる（ADR-017/038）。
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  # dev の SQLite を載せる named volume（上の ⚠️ 参照＝macOS Docker Desktop の FUSE 上で
  # SQLite が壊れるのを避けるため bind mount を使わない）。`docker compose down` では消えず、
  # 消すときは明示的に `docker compose down -v` か `docker volume rm`。ホストから素ファイルとして
  # 見えないため、バックアップ/復元は Makefile の `db-backup` / `db-restore` を使う。
  assetvane-db:
